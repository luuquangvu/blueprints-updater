repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff-format
        entry: uv run --no-project ruff format
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: ruff-check
        entry: uv run --no-project ruff check --fix
        language: system
        pass_filenames: false
        always_run: true

      - id: ty-check
        name: ty-check
        entry: uv run --no-project ty check
        language: system
        pass_filenames: false
        always_run: true

      - id: pyright
        name: pyright
        entry: uv run --no-project pyright
        language: system
        pass_filenames: false
        always_run: true

      - id: interrogate
        name: interrogate
        entry: uv run --no-project interrogate
        language: system
        pass_filenames: false
        always_run: true

      - id: prettier
        name: prettier
        entry: npx prettier --log-level warn --write .
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest
        name: pytest
        entry: uv run --no-project pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: compatibility
        name: compatibility
        entry: uv run --no-project tools/validate_compatibility.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
