name: Formatting Check

on:
  push:
    branches:
      - main
    paths:
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.md"
      - "**.toml"
  pull_request:
    branches:
      - main
    paths:
      - "**.yaml"
      - "**.yml"
      - "**.json"
      - "**.md"
      - "**.toml"

jobs:
  prettier:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Prettier
        run: npx prettier --check .
