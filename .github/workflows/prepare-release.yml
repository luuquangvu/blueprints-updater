name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Select version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare-release:
    name: "Prepare Release Pull Request"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Calculate release version
        id: release
        shell: bash
        run: |
          set -euo pipefail

          export BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          export IS_PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          export TAG_PREFIX=""
          LATEST_STABLE="$(git tag --list --sort=-v:refname | grep -E '^([0-9]+\.[0-9]+\.[0-9]+)$' | head -n 1 || true)"
          export LATEST_STABLE="${LATEST_STABLE:-0.0.0}"
          CURRENT_ANY="$(git tag --list --sort=-v:refname | grep -E '^([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$' | head -n 1 || true)"
          export CURRENT_ANY="${CURRENT_ANY:-0.0.0}"
          ALL_TAGS="$(git tag --list)"
          export ALL_TAGS

          CALCULATED_VERSION="$(uv run tools/calculate_version.py)"
          VERSION="${CALCULATED_VERSION}"

          if [[ ! "$VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$ ]]; then
            echo "::error::Calculated release version $VERSION is not valid"
            exit 1
          fi

          BRANCH="release/$VERSION"
          TAG="$VERSION"

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::error::Release branch $BRANCH already exists"
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Release tag $TAG already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "NEW_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update versions
        run: uv run tools/update_project_metadata.py

      - name: Format release metadata
        run: npx prettier --write custom_components/blueprints_updater/manifest.json pyproject.toml

      - name: Update uv.lock
        run: uv lock

      - name: Create release pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ github.token }}
          base: ${{ github.event.repository.default_branch }}
          branch: ${{ steps.release.outputs.branch }}
          commit-message: Bump version to ${{ steps.release.outputs.version }}
          title: Release ${{ steps.release.outputs.version }}
          body: Prepare release ${{ steps.release.outputs.tag }}.
          labels: release
          add-paths: |
            custom_components/blueprints_updater/manifest.json
            pyproject.toml
            uv.lock
