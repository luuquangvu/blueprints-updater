name: Stale
on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  stale:
    name: "Stale Issue Manager"
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 30 days stale issues
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          days-before-stale: 23
          days-before-close: 7
          stale-issue-label: "stale"
          exempt-issue-labels: "no-stale"
          stale-issue-message: "This issue has been inactive for 23 days. It will be automatically closed in 7 days if there is no further activity. Thank you for your contributions!"
          close-issue-message: "This issue was closed because it has been inactive for 30 days."
          days-before-pr-stale: -1
          days-before-pr-close: -1
