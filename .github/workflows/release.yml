name: Release

on:
  push:
    tags:
      - '*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update manifest.json
        run: |
          jq '.version = "${{ steps.get_version.outputs.VERSION }}"' custom_components/blueprints_updater/manifest.json > manifest.json.tmp
          mv manifest.json.tmp custom_components/blueprints_updater/manifest.json

      - name: Update pyproject.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.get_version.outputs.VERSION }}"/' pyproject.toml

      - name: Commit and push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/blueprints_updater/manifest.json pyproject.toml
          git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}"
          git pull --rebase origin ${{ github.event.repository.default_branch }}
          git push origin HEAD:${{ github.event.repository.default_branch }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
