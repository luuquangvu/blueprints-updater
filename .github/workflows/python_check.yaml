name: Python Checks

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python_check.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python_check.yaml"

permissions:
  contents: read

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Ruff Format
        run: uv run ruff format --check

      - name: Run Ty Check
        run: uv run ty check

      - name: Run Pyright
        run: uv run pyright

      - name: Run Interrogate
        run: uv run interrogate -v

      - name: Run Tests
        run: uv run pytest
