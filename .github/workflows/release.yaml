name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Select version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Setup version
        id: get_version
        shell: bash
        run: |
          set -euo pipefail
          shopt -s inherit_errexit 2>/dev/null || echo "Warning: inherit_errexit not supported" >&2

          export BUMP_TYPE="${{ github.event.inputs.bump_type }}"
          export IS_PRERELEASE="${{ github.event.inputs.prerelease || 'false' }}"
          LATEST_STABLE=$(git tag --list --sort=-v:refname | grep -E '^(v?[0-9]+\.[0-9]+\.[0-9]+)$' | head -n 1)
          export LATEST_STABLE="${LATEST_STABLE:-0.0.0}"
          CURRENT_ANY=$(git tag --list --sort=-v:refname | grep -E '^(v?[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?)$' | head -n 1)
          export CURRENT_ANY="${CURRENT_ANY:-0.0.0}"
          export ALL_TAGS=$(git tag --list || true)

          NEW_VERSION=$(uv run --with packaging python tools/calculate_version.py) || {
              echo "Error: Version calculation failed"
              exit 1
          }

          if [[ -z "$NEW_VERSION" ]]; then
              echo "Error: Calculated version is empty"
              exit 1
          fi

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Update versions
        run: |
          uv run --with tomlkit python tools/update_project_metadata.py

      - name: Format files
        run: npx prettier --write custom_components/blueprints_updater/manifest.json pyproject.toml

      - name: Update uv.lock
        run: uv lock

      - name: Commit and push changes
        id: commit_push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/blueprints_updater/manifest.json pyproject.toml uv.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}"
            git pull --rebase origin ${{ github.event.repository.default_branch }}
            git push origin HEAD:${{ github.event.repository.default_branch }}
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        run: |
          TAG="${{ steps.get_version.outputs.TAG_NAME }}"
          SHA="${{ steps.commit_push.outputs.COMMIT_SHA }}"
          git tag "$TAG" "$SHA"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ steps.get_version.outputs.TAG_NAME }}
          commit: ${{ steps.commit_push.outputs.COMMIT_SHA }}
          generateReleaseNotes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
