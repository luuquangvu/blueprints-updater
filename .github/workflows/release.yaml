name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.0.2)"
        required: true
        type: string
      prerelease:
        description: "Mark as pre-release"
        required: false
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Setup version
        id: get_version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG_NAME=$VERSION" >> $GITHUB_OUTPUT

      - name: Validate version
        run: |
          NEW_VERSION="${{ steps.get_version.outputs.VERSION }}"
          TAG_NAME="${{ steps.get_version.outputs.TAG_NAME }}"

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Error: Tag $TAG_NAME already exists."
            exit 1
          fi

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          LATEST_VERSION="$LATEST_TAG"

          uv run --with packaging python -c "
          from packaging.version import parse, InvalidVersion
          import sys

          try:
              v_new = parse('$NEW_VERSION')
              v_old = parse('$LATEST_VERSION')
          except InvalidVersion as e:
              print(f'Error: Invalid version format -> {e}')
              sys.exit(1)

          if not (v_new > v_old):
              print(f'Error: New version ({v_new}) must be strictly greater than the latest released version ({v_old}).')
              sys.exit(1)
          "
          echo "Version validation passed."

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          jq ".version = \"$VERSION\"" custom_components/blueprints_updater/manifest.json > manifest.json.tmp
          mv manifest.json.tmp custom_components/blueprints_updater/manifest.json

      - name: Update pyproject.toml
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml

      - name: Format files
        run: npx prettier --write custom_components/blueprints_updater/manifest.json pyproject.toml

      - name: Update uv.lock
        run: uv lock

      - name: Commit and push changes
        id: commit_push
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/blueprints_updater/manifest.json pyproject.toml uv.lock
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          else
            git commit -m "Bump version to ${{ steps.get_version.outputs.VERSION }}"
            git pull --rebase origin ${{ github.event.repository.default_branch }}
            git push origin HEAD:${{ github.event.repository.default_branch }}
            echo "COMMIT_SHA=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        run: |
          TAG="${{ steps.get_version.outputs.TAG_NAME }}"
          SHA="${{ steps.commit_push.outputs.COMMIT_SHA }}"
          git tag "$TAG" "$SHA"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          tag: ${{ steps.get_version.outputs.TAG_NAME }}
          commit: ${{ steps.commit_push.outputs.COMMIT_SHA }}
          generateReleaseNotes: true
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
