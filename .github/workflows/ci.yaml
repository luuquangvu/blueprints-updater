name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
      - "tools/compatibility_matrix.json"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
      - "tools/compatibility_matrix.json"

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Ruff Format
        run: uv run ruff format --check

      - name: Run Ty Check
        run: uv run ty check

      - name: Run Pyright
        run: uv run pyright

      - name: Run Interrogate
        run: uv run interrogate -v

      - name: Run Tests
        run: uv run pytest

  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set matrix
        id: set-matrix
        run: |
          MATRIX_JSON=$(cat tools/compatibility_matrix.json | jq -c '{include: .}')
          echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT

  compatibility:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: |
          uv --no-config venv --python ${{ matrix.python_version }}
          HA_SPEC="homeassistant==${{ matrix.ha_version }}"
          if [ "${{ matrix.ha_version }}" = "latest" ]; then
            HA_SPEC="homeassistant"
          fi
          uv --no-config pip install $HA_SPEC pytest-homeassistant-custom-component h2
          source .venv/bin/activate
          python -m pip install --ignore-requires-python -e .

      - name: Run Tests
        run: |
          source .venv/bin/activate
          python -m pytest
