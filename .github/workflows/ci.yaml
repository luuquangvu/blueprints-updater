name: CI

on:
  push:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "**.py"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yaml"

permissions:
  contents: read

jobs:
  static-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run Ruff
        run: uv run ruff check

      - name: Run Ruff Format
        run: uv run ruff format --check

      - name: Run Ty Check
        run: uv run ty check

      - name: Run Pyright
        run: uv run pyright

      - name: Run Interrogate
        run: uv run interrogate -v

      - name: Run Tests
        run: uv run pytest

  compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ha-version: "2024.12"
            python-version: "3.13"
          - ha-version: "2026.2"
            python-version: "3.13"
          - ha-version: "2026.4"
            python-version: "3.14"
          - ha-version: "latest"
            python-version: "3.14"

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          HA_SPEC="homeassistant==${{ matrix.ha-version }}"
          if [ "${{ matrix.ha-version }}" = "latest" ]; then
            HA_SPEC="homeassistant"
          fi
          uv pip install $HA_SPEC pytest pytest-asyncio pytest-cov pytest-homeassistant-custom-component pytest-timeout
          uv pip install -e .

      - name: Run Tests
        run: uv run pytest --quiet --no-cov
