reload:
  name: Reload blueprints
  description: Scans all local blueprints for new files and checks for updates immediately.
restore_blueprint:
  name: Restore Blueprint
  description: Restores a blueprint from a numbered backup file (.bak.1, .bak.2, etc.) if available.
  fields:
    entity_id:
      name: Blueprint Entity
      description: The update entity of the blueprint you want to restore.
      required: true
      selector:
        entity:
          integration: blueprints_updater
          domain: update
    version:
      name: Backup Version
      description: Which backup version to restore (1 = newest, 2 = older, etc.)
      required: false
      default: 1
      selector:
        number:
update_all:
  name: Update All Blueprints
  description: Automatically downloads and installs all available blueprint updates.
  fields:
    backup:
      name: Create Backup
      description: Create numbered backup files for all updated blueprints before overwriting.
      required: false
      default: true
      selector:
        boolean:
import_blueprint:
  name: Import Blueprint
  description: Downloads and installs a blueprint from a URL.
  fields:
    url:
      name: Blueprint URL
      description: The URL of the blueprint. Supports direct YAML links or provider URLs (GitHub, GitHub Gist, Home Assistant Community, GitLab, Codeberg, Bitbucket).
      required: true
      selector:
        text:
    confirm:
      name: Confirm External Source
      description: Required to acknowledge importing from external/unverified sources.
      required: true
      default: false
      selector:
        boolean:
