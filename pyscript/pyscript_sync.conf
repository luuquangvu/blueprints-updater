# =============================================================
# pyscript_sync.conf
# Cau hinh cho pyscript_sync_from_urls.sh
# Copy file nay ve /config/scripts/pyscript_sync.conf
# =============================================================

# Thu muc dich de luu file pyscript
_pyscript_sync_dir="/config/pyscript"

# File danh sach nguon (manifest)
# Format moi dong: url|dest  hoac  url|dest/|recursive
_pyscript_sync_manifest="${_pyscript_sync_dir}/_sources.txt"

# Tu dong ghi file khi co thay doi (true/false)
# false = chi kiem tra, khong ghi file
_pyscript_sync_auto_update="false"

# GitHub Personal Access Token (de trong neu public repo)
_pyscript_sync_token=""

# Tu dong reload pyscript sau khi cap nhat (true/false)
_pyscript_sync_reload="true"

# Tuy chon curl bo sung
_pyscript_sync_curl_options="--silent"

# Hien thi debug output (true/false)
_pyscript_sync_debug="false"
